<!DOCTYPE html>
<html>
<head>
    <title>AI Interview Pro</title>

    <style>
        body {
            font-family: Arial;
            background: #0f172a;
            color: #e2e8f0;
            text-align: center;
            margin: 0;
        }

        h1 {
            background: #1e293b;
            padding: 20px;
            margin: 0;
            color: #38bdf8;
        }

        input, textarea, button {
            margin-top: 10px;
        }

        textarea {
            width: 60%;
            height: 120px;
            background: #1e293b;
            color: white;
            border: none;
            padding: 10px;
        }

        button {
            padding: 10px 20px;
            background: #38bdf8;
            border: none;
            cursor: pointer;
            font-weight: bold;
        }

        #timer {
            color: yellow;
        }
    </style>
</head>

<body>

<h1>AI Interview Pro</h1>

<form id="startForm">
    <input type="file" name="resume">
    <button>Start Interview</button>
</form>

<h2 id="question">Upload resume to start</h2>

<h3>Timer: <span id="timer">60</span></h3>

<textarea id="answer"></textarea><br>

<button onclick="next()">Submit</button>

<pre id="output"></pre>

<script>

let time = 60;
let timer;

function startTimer(){
    clearInterval(timer);
    time = 60;

    timer = setInterval(()=>{
        time--;
        document.getElementById("timer").innerText = time;

        if(time <= 0){
            clearInterval(timer);
            next();
        }
    },1000);
}


document.getElementById("startForm").onsubmit = async function(e){
    e.preventDefault();

    let form = new FormData(this);

    let res = await fetch("/start", {
        method:"POST",
        body: form
    });

    let data = await res.json();

    document.getElementById("question").innerText = data.question;

    startTimer();
};


async function next(){

    let answer = document.getElementById("answer").value;

    let res = await fetch("/next", {
        method:"POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({answer})
    });

    let data = await res.json();

    document.getElementById("output").innerText = data.feedback || "";

    if(data.done){

        document.body.innerHTML = `
            <h1>Interview Completed 🎯</h1>

            <h2>Final Score: ${data.final_score}%</h2>

            <h3>${data.suggestion}</h3>

            <button onclick="location.reload()">Restart</button>
        `;

        clearInterval(timer);
    }
    else{
        document.getElementById("question").innerText = data.question;
        document.getElementById("answer").value = "";
        startTimer();
    }
}

</script>

</body>
</html>
